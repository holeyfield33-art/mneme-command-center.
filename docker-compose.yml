services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mneme-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    working_dir: /workspace/apps/api
    command: ["python", "main.py"]

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: mneme-worker
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["python", "-m", "worker.main"]

  dashboard:
    image: node:20-alpine
    container_name: mneme-dashboard
    working_dir: /workspace/apps/dashboard
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
    command: ["sh", "-c", "npm install && npm run dev -- --host"]

  # Optional local free model endpoint
  ollama:
    image: ollama/ollama:latest
    container_name: mneme-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

volumes:
  ollama_data:
