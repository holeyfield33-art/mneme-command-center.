name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r worker/requirements.txt

      - name: Run pytest (baseline)
        run: |
          pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build

  live-api-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-tests
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r worker/requirements.txt

      - name: Start API server
        env:
          MNEME_ADMIN_PASSWORD: admin
          MNEME_API_HOST: 127.0.0.1
          MNEME_API_PORT: "8000"
        run: |
          python apps/api/main.py > api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become healthy"
          cat api.log
          exit 1

      - name: Run live integration tests
        env:
          MNEME_RUN_LIVE_TESTS: "1"
          MNEME_RUN_WORKER_TESTS: "1"
          MNEME_ADMIN_PASSWORD: admin
          MNEME_API_URL: http://127.0.0.1:8000
        run: |
          pytest -v tests/test_integration.py

      - name: Dump API log on failure
        if: failure()
        run: cat api.log

      - name: Upload live API artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-api-failure-artifacts
          path: |
            api.log
          if-no-files-found: ignore

  ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - frontend-build
      - live-api-integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/dashboard
        run: npx playwright install --with-deps chromium

      - name: Start API server
        env:
          MNEME_ADMIN_PASSWORD: admin
          MNEME_API_HOST: 127.0.0.1
          MNEME_API_PORT: "8000"
        run: |
          python apps/api/main.py > api-ui.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become healthy"
          cat api-ui.log
          exit 1

      - name: Run Playwright smoke tests
        working-directory: apps/dashboard
        env:
          VITE_API_URL: http://127.0.0.1:8000
        run: npm run test:ui

      - name: Upload UI smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-failure-artifacts
          path: |
            api-ui.log
            apps/dashboard/playwright-report
            apps/dashboard/test-results
          if-no-files-found: ignore